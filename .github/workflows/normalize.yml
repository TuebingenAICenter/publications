name: Normalize entries

# Role 1 of 2 — the MUTATING diff job. On every PR, find the .bib files it
# changed (anywhere in the repo), rewrite them into the canonical store layout
# (entries/<year>/<key>.bib + meta/<year>/<key>.json), relocate/delete raw
# drops, and commit the result back to the PR branch.
#
# This job REPAIRS; it does NOT gate. The merge gate is the read-only required
# status in check.yml (pubstore-check), kept in a separate workflow so it can be
# a required status independently of this contents:write job. "Merge when green"
# — no merge queue, no require-branches-up-to-date (decided): the only extra
# thing those would catch is the rare concurrent cross-shard citekey dup, which
# we accept as a transient duplicate reconciled by check-scheduled.yml.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Needed so the job can push the normalized result back to the PR branch.
permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Check out the PR's own branch (not a detached merge ref) so we can
          # push back to it. fetch-depth: 0 gives us the base branch for the diff.
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        # Installs the tools/ package (publication-store) and its pinned deps —
        # zotero-rdf + jsonschema (validates sidecars against
        # schema/sidecar.schema.json). zotero-rdf is pinned by a git URL; the
        # insteadOf rewrite lets an anonymous runner (no SSH keys) fetch it over
        # public HTTPS regardless of whether pyproject pins the ssh:// or the
        # https:// form. If that GitLab repo ever goes private, swap in a token.
        run: |
          git config --global \
            url."https://gitlab.mlcloud.uni-tuebingen.de/".insteadOf \
            "ssh://gitlab.mlcloud.uni-tuebingen.de/"
          pip install ./tools

      - name: Find changed .bib files
        id: changed
        run: |
          git diff --name-only --diff-filter=ACMR \
            "origin/${{ github.base_ref }}...HEAD" -- '*.bib' > changed.txt
          echo "Changed .bib files:"; cat changed.txt
          if [ -s changed.txt ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalize changed entries
        if: steps.changed.outputs.any == 'true'
        # Per-entry: canonicalize the bib (S4), place it at its derived path
        # (S1), create/wrap the sidecar (S3/S4), relocate+delete on a year/key
        # change (S1/S3/S5), and run the idempotency self-check. The full-store
        # S1–S5 gate is check.yml's job, not this one.
        run: pubstore-normalize --root . $(cat changed.txt)

      - name: Commit normalized result back to the PR branch
        if: steps.changed.outputs.any == 'true'
        # Two operational requirements (set in repo settings — see Task 4 README):
        #  - "Dismiss stale reviews on push" must be OFF (or this bot exempted),
        #    so a reformat never wipes a human approval.
        #  - This default-token push does NOT re-trigger CI. That is fine: the
        #    normalizer is idempotent, so there is nothing to re-run, and the
        #    required status (check.yml) already passed the human-pushed tree.
        #    ([skip ci] below is belt-and-suspenders.)
        run: |
          git config user.name  "tueai-publications-bot"
          git config user.email "bot@tuebingen.ai"
          git add -A
          if git diff --cached --quiet; then
            echo "Already canonical — nothing to commit."
          else
            git commit -m "chore: normalize entries to canonical store layout [skip ci]"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
