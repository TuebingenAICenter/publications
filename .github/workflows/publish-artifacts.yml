name: Publish compiled artifacts (manual)

# Add-on (separable): on-demand recompile of the consumer-facing joined views —
# all.bib, one <group>.bib per PI group, meta.json, and library.rdf — uploaded as a
# single workflow artifact. These are BUILD ARTIFACTS, never committed; always
# reproducible from entries/** + meta/** by `pubstore-compile`.
#
# This is the MANUAL path only. The per-merge snapshot path lives in release.yml,
# which compiles (via the same compile-artifacts.yml building block) and attaches
# each file as its own release asset. This workflow exists so a maintainer can pull
# a fresh build off any green main without minting a release.
#
# Deleting this one file disables the manual pull with no effect on releases, the
# PR gate (pr-checks.yml), or the scheduled backstop (check-scheduled.yml). It is
# NOT a gate — pubstore-compile assumes the store is already green, warns + skips
# anything that won't parse, and never fails.
#
# Triggers:
#  - workflow_dispatch -> manual recompile, the bundled build/ zip workflow artifact.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  compile:
    # Reuse the shared compile building block; the default artifact name uploads
    # build/ as the `publication-store-artifacts` zip on the run.
    uses: ./.github/workflows/compile-artifacts.yml
